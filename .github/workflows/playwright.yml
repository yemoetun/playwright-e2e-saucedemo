name: Playwright E2E Tests

# ---------------------------------------------------------------
# Trigger: Run on every push to main AND on every pull request.
# This gives fast feedback for feature branches and protects main.
# ---------------------------------------------------------------
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the correct Node.js version
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install npm dependencies (uses lockfile for reproducible installs)
      - name: Install dependencies
        run: npm ci

      # 4. Install the Playwright browser binaries needed by the runner
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5. Execute the full test suite in headless mode
      #    Credentials are injected via GitHub Secrets — never hard-coded.
      - name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'standard_user' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'secret_sauce' }}
          CHECKOUT_FIRST_NAME: ${{ secrets.CHECKOUT_FIRST_NAME || 'John' }}
          CHECKOUT_LAST_NAME: ${{ secrets.CHECKOUT_LAST_NAME || 'Doe' }}
          CHECKOUT_ZIP: ${{ secrets.CHECKOUT_ZIP || '10001' }}
        run: npx playwright test

      # 6. Upload the HTML test report as a workflow artifact.
      #    Even when tests fail, this step runs so you can download
      #    the report and inspect traces, screenshots, or videos.
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
